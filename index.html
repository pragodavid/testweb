<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🥗 Chytrý Jídelníček</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    :root {
      --c-header: #2e7d32;
      --c-breakfast: #f9a825;
      --c-lunch: #388e3c;
      --c-dinner: #1565c0;
      --c-action: #ff6f00;
      --c-restart hubni: #00695c;
      --c-kucharka pro dceru: #6a1d8a;
      --c-bg: #e8f5e9;
      --c-checked: #d32f2f;
    }
    body { background: var(--c-bg); font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ── Sticky bar ── */
    .sticky-bar { position: sticky; top: 0; z-index: 50; background: var(--c-header); box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 5px 0; }
    .filter-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.7); white-space: nowrap; min-width: 52px; }

    /* Day toggle buttons */
    .btn-day { padding: 3px 9px; border-radius: 6px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,.55); background: rgba(255,255,255,.1); cursor: pointer; border: 1px solid rgba(255,255,255,.15); transition: all .15s; user-select: none; }
    .btn-day.active { color: #fff; background: rgba(255,255,255,.3); border-color: rgba(255,255,255,.4); }
    .btn-day.shopping-day { outline: 2px solid #ffeb3b; outline-offset: 1px; }
    .btn-quick { padding: 3px 7px; border-radius: 4px; font-size: 11px; color: rgba(255,255,255,.65); background: transparent; border: 1px solid rgba(255,255,255,.2); cursor: pointer; }
    .btn-quick:hover { background: rgba(255,255,255,.15); color: #fff; }

    /* Meal toggle + source select */
    .meal-group { display: flex; align-items: center; gap: 3px; background: rgba(0,0,0,.15); border-radius: 7px; padding: 3px 6px; }
    .btn-meal { padding: 2px 7px; border-radius: 5px; font-size: 12px; font-weight: 700; color: rgba(255,255,255,.5); background: transparent; border: none; cursor: pointer; transition: all .15s; }
    .btn-meal.active { color: #fff; background: rgba(255,255,255,.22); }
    .src-select { font-size: 11px; background: rgba(255,255,255,.12); color: #fff; border: none; border-radius: 4px; padding: 2px 4px; cursor: pointer; outline: none; }
    .src-select option { background: #1b5e20; color: #fff; }

    /* Source badges */
    .src-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; color: white; margin-bottom: 4px; }
    .src-badge.restart { background: var(--c-restart); }
    .src-badge.kucharkadc { background: var(--c-kucharkadc); }

    /* Recipe card */
    .recipe-card { border-left: 4px solid #ccc; background: white; border-radius: 8px; padding: 12px; cursor: pointer; transition: box-shadow .2s, transform .1s; }
    .recipe-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); transform: translateY(-2px); }
    .recipe-card[data-source="restart"] { border-left-color: var(--c-restart); }
    .recipe-card[data-source="kucharkadc"] { border-left-color: var(--c-kucharkadc); }

    /* Meal section header strip */
    .meal-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 5px 10px; border-radius: 6px 6px 0 0; color: white; }
    .meal-snidane { background: var(--c-breakfast); }
    .meal-obed    { background: var(--c-lunch); }
    .meal-vecere  { background: var(--c-dinner); }

    /* Shopping list */
    .row-akce { background: #fff8e1 !important; }
    tr.checked-row td { color: var(--c-checked); text-decoration: line-through; opacity: .5; }
    .shop-section-header td { background: #f3f4f6; font-weight: 700; font-size: 11px; color: #555; padding: 6px 8px !important; }

    /* Tag pills */
    .tag-vydatne { background: var(--c-dinner); color: #fff; }
    .tag-smisene { background: var(--c-lunch); color: #fff; }
    .tag-lehke   { background: var(--c-breakfast); color: #fff; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; z-index: 1000; overflow-y: auto; }
    .modal-overlay.active { display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
    .modal-box { background: white; border-radius: 12px; max-width: 560px; width: 100%; padding: 24px; position: relative; margin: auto; }

    /* Header select */
    .header-select { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); border-radius: 6px; padding: 4px 8px; font-size: 13px; cursor: pointer; outline: none; }
    .header-select option { background: #1b5e20; color: #fff; }
    .deal-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(255,111,0,.85); color: #fff; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

    /* Weather chip */
    .w-chip { font-size: 11px; background: rgba(255,255,255,.18); border-radius: 20px; padding: 2px 8px; }

    /* Toast */
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: var(--c-header); color: white; padding: 12px 18px; border-radius: 8px; font-size: 13px; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.3); }

    @media (max-width: 640px) { .meal-grid { grid-template-columns: 1fr !important; } }
  </style>
</head>
<body>

<!-- ══════════════════════ HEADER ══════════════════════ -->
<header style="background: var(--c-header);" class="text-white px-4 py-3 shadow-lg">
  <div class="max-w-5xl mx-auto">

    <!-- Top row: title + deal validity + shopping day -->
    <div class="flex flex-wrap justify-between items-start gap-3 mb-2">
      <div>
        <h1 class="text-xl font-bold leading-tight">🥗 Chytrý Jídelníček</h1>
        <p class="text-xs opacity-60 mt-0.5">Generováno 21. 4. 2026 · Praha</p>
      </div>
      <div class="flex flex-wrap gap-3 items-center">
        <span class="deal-badge">🏷️ Leták Kaufland: 21. 4. – 27. 4. 2026</span>
        <label class="flex items-center gap-2 text-sm font-semibold">
          🛒 Den nákupu:
          <select id="shopping-day-select" class="header-select" onchange="setShoppingDay(this.value)">
            <option value="">— nevybráno —</option>
            <option value="ut">Úterý</option>
            <option value="st">Středa</option>
            <option value="ct">Čtvrtek</option>
            <option value="pa" selected>Pátek ✓</option>
            <option value="so">Sobota</option>
            <option value="ne">Neděle</option>
            <option value="po">Pondělí</option>
          </select>
        </label>
      </div>
    </div>

    <!-- Weather summary -->
    <div id="weather-summary" class="flex gap-1.5 flex-wrap"></div>

  </div>
</header>

<!-- ══════════════════════ STICKY FILTER BAR ══════════════════════ -->
<div class="sticky-bar">
  <div class="max-w-5xl mx-auto px-4 py-1.5">

    <!-- Row 1: Day multiselect -->
    <div class="filter-row">
      <span class="filter-label">📅 Dny:</span>
      <div class="flex gap-1 flex-wrap" id="day-filters">
        <button class="btn-day active" data-day-id="ut" onclick="toggleDay('ut',this)">Út 21.</button>
        <button class="btn-day active" data-day-id="st" onclick="toggleDay('st',this)">St 22.</button>
        <button class="btn-day active" data-day-id="ct" onclick="toggleDay('ct',this)">Čt 23.</button>
        <button class="btn-day active" data-day-id="pa" onclick="toggleDay('pa',this)">Pá 24.</button>
        <button class="btn-day active" data-day-id="so" onclick="toggleDay('so',this)">So 25.</button>
        <button class="btn-day active" data-day-id="ne" onclick="toggleDay('ne',this)">Ne 26.</button>
        <button class="btn-day active" data-day-id="po" onclick="toggleDay('po',this)">Po 27.</button>
      </div>
      <div class="flex gap-1 ml-1">
        <button class="btn-quick" onclick="toggleAllDays(true)">Vše</button>
        <button class="btn-quick" onclick="toggleAllDays(false)">Žádný</button>
      </div>
    </div>

    <!-- Row 2: Meal filters with per-meal source selectors -->
    <div class="filter-row">
      <span class="filter-label">🍽️ Chody:</span>
      <div class="meal-group">
        <button id="btn-sn" class="btn-meal active" onclick="toggleMeal('snidane',this)" title="Snídaně">🍳 Sn</button>
        <select id="src-snidane" class="src-select" onchange="setMealSource('snidane',this.value)" title="Zdroj snídaně">
          <option value="both">Oba</option>
          <option value="restart">Restart</option>
          <option value="kucharkadc">Kuchařka</option>
        </select>
      </div>
      <div class="meal-group">
        <button id="btn-ob" class="btn-meal active" onclick="toggleMeal('obed',this)" title="Oběd">🥗 Ob</button>
        <select id="src-obed" class="src-select" onchange="setMealSource('obed',this.value)" title="Zdroj oběda">
          <option value="both">Oba</option>
          <option value="restart">Restart</option>
          <option value="kucharkadc">Kuchařka</option>
        </select>
      </div>
      <div class="meal-group">
        <button id="btn-ve" class="btn-meal active" onclick="toggleMeal('vecere',this)" title="Večeře">🍽️ Ve</button>
        <select id="src-vecere" class="src-select" onchange="setMealSource('vecere',this.value)" title="Zdroj večeře">
          <option value="both">Oba</option>
          <option value="restart">Restart</option>
          <option value="kucharkadc">Kuchařka</option>
        </select>
      </div>
      <div class="flex gap-1 ml-auto">
        <label class="flex items-center gap-1 text-xs text-white/70 cursor-pointer">
          <input type="checkbox" id="show-akce-only" onchange="setAkceFilter(this.checked)" class="w-3 h-3">
          Jen AKCE
        </label>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════ KAUFLAND DEALS STRIP ══════════════════════ -->
<div class="max-w-5xl mx-auto px-4 mt-3">
  <div class="bg-orange-50 border border-orange-200 rounded-xl p-2.5 flex gap-2 flex-wrap items-center">
    <span class="font-bold text-orange-700 text-xs shrink-0">🏷️ KAUFLAND AKCE:</span>
    <div id="deals-strip" class="flex gap-1.5 flex-wrap text-xs"></div>
  </div>
</div>

<!-- ══════════════════════ DAY CARDS ══════════════════════ -->
<main class="max-w-5xl mx-auto px-4 pb-6" id="days-container"></main>

<!-- ══════════════════════ SHOPPING LIST ══════════════════════ -->
<section class="max-w-5xl mx-auto px-4 pb-4">
  <div class="bg-white rounded-xl shadow p-4">
    <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
      <h2 class="text-xl font-bold">🛒 Nákupní seznam</h2>
      <div id="shopping-info" class="text-xs text-gray-500"></div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm border-collapse" id="shopping-table">
        <thead>
          <tr class="bg-gray-50 text-gray-600 text-xs">
            <th class="p-2 w-7"></th>
            <th class="p-2 text-left">Položka</th>
            <th class="p-2 text-center w-28">Množství</th>
            <th class="p-2 text-right w-24">Cena</th>
            <th class="p-2 text-left text-gray-400 hidden sm:table-cell">Poznámka</th>
          </tr>
        </thead>
        <tbody id="shopping-body"></tbody>
      </table>
    </div>
    <div class="mt-4 flex justify-between items-center flex-wrap gap-3 border-t pt-3">
      <div class="text-xs text-gray-500">Odškrtnuté a skryté položky se nezapočítávají</div>
      <div class="text-xl font-bold">Celkem: <span id="total-price" class="text-green-700">0,00</span> Kč</div>
    </div>
  </div>
</section>

<!-- ══════════════════════ EXPORT BAR ══════════════════════ -->
<div class="max-w-5xl mx-auto px-4 pb-8">
  <div class="bg-white rounded-xl shadow p-4 flex gap-3 flex-wrap">
    <button onclick="generatePDF()" class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-semibold text-sm transition">
      <i class="fas fa-file-pdf"></i> Stáhnout PDF
    </button>
    <button onclick="sendEmailPlan()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold text-sm transition">
      <i class="fas fa-envelope"></i> Odeslat e-mailem
    </button>
    <button onclick="copyShoppingText()" class="flex items-center gap-2 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-semibold text-sm transition">
      <i class="fas fa-copy"></i> Kopírovat seznam
    </button>
  </div>
</div>

<!-- ══════════════════════ MODAL (one universal) ══════════════════════ -->
<div class="modal-overlay" id="recipe-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button onclick="closeModal()" class="absolute top-3 right-4 text-2xl text-gray-400 hover:text-gray-700 font-bold leading-none">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<!-- ══════════════════════ DATA ══════════════════════ -->

  "rst_ob2":{"id":"rst_ob2","source":"restart","sourceLabel":"Restart hubnutí","sourceUrl":"https://restarthubnuti.cz/kapustove-bochanky-s-krutim-masem-a-kari-omackou/","meal":"obed","name":"Kapustové bochánky s krůtím masem","time":"35 min","calories":"~420 kcal","tag":"vydatne","ingredients":[{"name":"Mleté krůtí maso","qty":"600 g"},{"name":"Kapusta","qty":"0,5 hlávky"},{"name":"Vejce","qty":"2 ks"},{"name":"Mouka","qty":"4 lžíce"},{"name":"Kari","qty":"2 lžičky"},{"name":"🏷️ Slunečnicový olej Slunka","qty":"na smažení"},{"name":"🏷️ Olma Florian jogurt","qty":"150 g"}],"steps":["Kapustu blanšírujte 3 min a nasekejte.","Smíchejte maso, kapustu, vejce, mouku, sůl.","Smažte bochánky 4 min z každé strany.","Připravte kari omáčku z jogurtu a kari.","Podávejte přelité omáčkou."]},

/* ═══════════════════════════════════════════════
   MASTER FILTER — called after every state change
═══════════════════════════════════════════════ */
function applyFilters() {
  filterDayCards();
  filterMealSections();
  updateShoppingVisibility();
  recalcTotal();
}

/* ───── Day cards ───── */
function filterDayCards() {
  document.querySelectorAll('.day-card').forEach(card => {
    card.style.display = appState.activeDays.has(card.dataset.day) ? '' : 'none';
  });
}

function toggleDay(dayId, btn) {
  if (appState.activeDays.has(dayId)) appState.activeDays.delete(dayId);
  else appState.activeDays.add(dayId);
  btn.classList.toggle('active', appState.activeDays.has(dayId));
  applyFilters();
}

function toggleAllDays(activate) {
  DAY_ORDER.forEach(d => activate ? appState.activeDays.add(d) : appState.activeDays.delete(d));
  document.querySelectorAll('.btn-day').forEach(b =>
    b.classList.toggle('active', activate));
  applyFilters();
}

/* ───── Shopping day + reorder ───── */
function setShoppingDay(dayId) {
  appState.shoppingDay = dayId;
  // Mark button
  document.querySelectorAll('.btn-day').forEach(b =>
    b.classList.toggle('shopping-day', b.dataset.dayId === dayId));
  reorderDayCards();
  updateShoppingInfo();
}

function reorderDayCards() {
  if (!appState.shoppingDay) return;
  const container = document.getElementById('days-container');
  const shIdx = DAY_ORDER.indexOf(appState.shoppingDay);
  for (let i = 1; i <= DAY_ORDER.length; i++) {
    const dayId = DAY_ORDER[(shIdx + i) % DAY_ORDER.length];
    const card = document.getElementById('day-' + dayId);
    if (card) container.appendChild(card); // moves to end in new order
  }
}

function updateShoppingInfo() {
  const el = document.getElementById('shopping-info');
  if (!appState.shoppingDay) { el.textContent = ''; return; }
  const dayMeta = weatherData.find(d => d.dayId === appState.shoppingDay);
  if (dayMeta) el.textContent = `Nakupujete: ${dayMeta.dayFull} · jídelníček začíná den poté`;
}

/* ───── Meal sections ───── */
function toggleMeal(mealType, btn) {
  appState.activeMeals[mealType] = !appState.activeMeals[mealType];
  btn.classList.toggle('active', appState.activeMeals[mealType]);
  // Disable/enable source select
  const sel = document.getElementById('src-' + mealType);
  if (sel) sel.disabled = !appState.activeMeals[mealType];
  applyFilters();
}

function setMealSource(mealType, source) {
  appState.mealSources[mealType] = source;
  applyFilters();
}

function filterMealSections() {
  document.querySelectorAll('.day-card').forEach(dayCard => {
    if (!appState.activeDays.has(dayCard.dataset.day)) return;

    ['snidane','obed','vecere'].forEach(mealType => {
      const section = dayCard.querySelector(`.meal-section[data-meal="${mealType}"]`);
      if (!section) return;

      const mealOn = appState.activeMeals[mealType];
      section.style.display = mealOn ? '' : 'none';
      if (!mealOn) return;

      // Show/hide individual recipe cards by source
      const src = appState.mealSources[mealType];
      section.querySelectorAll('.recipe-card').forEach(card => {
        const cs = card.dataset.source;
        card.style.display = (src === 'both' || src === cs) ? '' : 'none';
      });
    });
  });
}

/* ───── Shopping list visibility ───── */
function getActiveSources() {
  const s = new Set();
  Object.entries(appState.activeMeals).forEach(([meal, on]) => {
    if (!on) return;
    const src = appState.mealSources[meal];
    if (src === 'both' || src === 'restart')    s.add('restart');
    if (src === 'both' || src === 'kucharkadc') s.add('kucharkadc');
  });
  return s;
}

function updateShoppingVisibility() {
  const activeSrc = getActiveSources();
  const noDays = appState.activeDays.size === 0;
  let lastHeader = null, sectionHasItems = false;

  document.querySelectorAll('#shopping-body tr').forEach(row => {
    const isHeader = !!row.querySelector('td[colspan]');
    if (isHeader) {
      // Finalise previous section header
      if (lastHeader) lastHeader.style.display = sectionHasItems ? '' : 'none';
      lastHeader = row;
      sectionHasItems = false;
      return;
    }

    const src = row.dataset.source || '';
    let vis = true;

    if (noDays) { vis = false; }
    else if (src === 'restart')    { vis = activeSrc.has('restart'); }
    else if (src === 'kucharkadc') { vis = activeSrc.has('kucharkadc'); }
    // src === '' → always visible (shared)

    if (appState.showOnlyAkce && !row.classList.contains('row-akce')) vis = false;

    row.style.display = vis ? '' : 'none';
    if (vis) sectionHasItems = true;
  });

  // Last section header
  if (lastHeader) lastHeader.style.display = sectionHasItems ? '' : 'none';
}

function setAkceFilter(checked) {
  appState.showOnlyAkce = checked;
  applyFilters();
}

/* ───── recalcTotal: only visible + unchecked ───── */
function recalcTotal() {
  let total = 0;
  document.querySelectorAll('#shopping-body tr').forEach(row => {
    if (row.querySelector('td[colspan]')) return;
    if (row.style.display === 'none') return;
    const chk = row.querySelector('input[type="checkbox"]');
    if (chk && !chk.checked) total += parseFloat(row.dataset.price || 0);
  });
  document.getElementById('total-price').textContent = total.toFixed(2);
}

function toggleShopItem(row) {
  row.classList.toggle('checked-row', row.querySelector('input').checked);
  recalcTotal();
}

/* ═══════════════════════════════════════════════
   RENDERING
═══════════════════════════════════════════════ */
const mealConfig = [
  {key:'snidane', label:'🍳 Snídaně', cls:'meal-snidane'},
  {key:'obed',    label:'🥗 Oběd',    cls:'meal-obed'},
  {key:'vecere',  label:'🍽️ Večeře',  cls:'meal-vecere'}
];
const tagLabels = {vydatne:'Vydatné', smisene:'Smíšené', lehke:'Lehké'};

function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = mealPlanData.map(day => `
    <div class="day-card mt-5" data-day="${day.dayId}" id="day-${day.dayId}">
      <div class="flex items-center justify-between bg-white rounded-xl shadow-sm px-4 py-2.5 mb-1.5">
        <div>
          <h2 class="text-base font-bold text-gray-800">${day.dayFull}
            <span class="text-gray-400 font-normal text-sm ml-1">${day.date.slice(5).replace('-','.')}.2026</span>
          </h2>
          <span class="text-xs text-gray-400">${{vydatne:'Vydatné recepty',smisene:'Smíšené recepty',lehke:'Lehké recepty'}[day.weather.type]}</span>
        </div>
        <div class="text-right">
          <div class="text-xl">${day.weather.icon}</div>
          <div class="text-xs font-bold text-gray-700">${day.weather.maxTemp}° / ${day.weather.minTemp}°C</div>
        </div>
      </div>
      ${mealConfig.map(mc => renderMealSection(mc, day)).join('')}
    </div>`).join('');
}

function renderMealSection(mc, day) {
  const ids = day.meals[mc.key];
  return `
    <div class="meal-section mb-1.5" data-meal="${mc.key}">
      <div class="meal-header ${mc.cls}">${mc.label}</div>
      <div class="meal-grid grid gap-2 mt-1" style="grid-template-columns:1fr 1fr">
        ${renderCard(recipesData[ids.restart])}
        ${renderCard(recipesData[ids.kucharkadc])}
      </div>
    </div>`;
}

function renderCard(r) {
  const tagCls = {vydatne:'tag-vydatne', smisene:'tag-smisene', lehke:'tag-lehke'}[r.tag] || '';
  return `
    <div class="recipe-card" data-source="${r.source}" onclick="openModal('${r.id}')">
      <span class="src-badge ${r.source}">${r.sourceLabel}</span>
      <h4 class="font-semibold text-sm text-gray-800 leading-tight">${r.name}</h4>
      <div class="mt-1 flex gap-2 flex-wrap text-xs text-gray-500">
        <span>⏱ ${r.time}</span>
        <span>🔥 ${r.calories}</span>
        <span class="px-1.5 py-0.5 rounded text-white text-xs ${tagCls}">${tagLabels[r.tag]||''}</span>
      </div>
      <div class="mt-1.5 text-xs text-blue-500">→ Zobrazit recept</div>
    </div>`;
}

function renderWeather() {
  document.getElementById('weather-summary').innerHTML = weatherData.map(d =>
    `<span class="w-chip">${d.dayAbbr} ${d.icon} ${d.maxTemp}°C</span>`).join('');
}

function renderDeals() {
  document.getElementById('deals-strip').innerHTML = kauflandDeals.map(d =>
    `<span class="bg-orange-100 text-orange-800 border border-orange-300 px-2 py-0.5 rounded-full font-semibold">
      ${d.name} <b>${d.price}</b> <span class="text-green-700">-${d.pct}%</span>
    </span>`).join('');
}

function renderShopping() {
  const tbody = document.getElementById('shopping-body');
  let lastSection = null;
  tbody.innerHTML = '';
  const labels = {akce:'🏷️ KAUFLAND AKCE',sdilene:'📦 Základní suroviny',restart:'🥬 Restart hubnutí',kucharkadc:'👩‍🍳 Kuchařka pro dceru'};

  shoppingData.forEach(item => {
    const section = item.isAkce ? 'akce' : (item.source || 'sdilene');

    if (section !== lastSection) {
      lastSection = section;
      const srcAttr = (section==='restart'||section==='kucharkadc') ? `data-source="${section}"` : '';
      tbody.insertAdjacentHTML('beforeend',
        `<tr ${srcAttr} class="shop-section-header"><td colspan="5">${labels[section]||section}</td></tr>`);
    }

    const srcAttr = item.source ? `data-source="${item.source}"` : '';
    tbody.insertAdjacentHTML('beforeend',
      `<tr ${srcAttr} class="${item.isAkce?'row-akce':''} border-b hover:bg-gray-50"
          data-price="${item.price}" id="shop-${item.id}">
        <td class="p-2"><input type="checkbox" onchange="toggleShopItem(this.closest('tr'))" class="w-4 h-4 cursor-pointer"></td>
        <td class="p-2 font-medium text-sm">${item.name}</td>
        <td class="p-2 text-center text-sm text-gray-600">${item.qty}</td>
        <td class="p-2 text-right text-sm font-semibold">${item.price.toFixed(2)} Kč</td>
        <td class="p-2 text-xs text-gray-400 hidden sm:table-cell">${item.note||''}</td>
      </tr>`);
  });
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
function openModal(id) {
  const r = recipesData[id];
  if (!r) return;
  const sc = r.source === 'restart' ? 'var(--c-restart)' : 'var(--c-kucharkadc)';
  document.getElementById('modal-body').innerHTML = `
    <span class="src-badge ${r.source}">${r.sourceLabel}</span>
    <h2 class="text-xl font-bold mt-1 mb-1">${r.name}</h2>
    <p class="text-sm text-gray-500 mb-3">⏱ ${r.time} &nbsp;|&nbsp; 🔥 ${r.calories} &nbsp;|&nbsp; 👥 4 osoby</p>
    <h3 class="font-bold border-b pb-1 mb-2" style="color:${sc}">Ingredience</h3>
    <ul class="space-y-1 mb-4">
      ${r.ingredients.map(i=>`<li class="flex justify-between text-sm border-b border-gray-50 py-1">
        <span>${i.name}</span><span class="text-gray-500 font-medium">${i.qty}</span></li>`).join('')}
    </ul>
    <h3 class="font-bold border-b pb-1 mb-2" style="color:${sc}">Postup</h3>
    <ol class="space-y-2">
      ${r.steps.map((s,i)=>`<li class="flex gap-2 text-sm">
        <span class="flex-shrink-0 w-5 h-5 rounded-full text-white text-xs flex items-center justify-center font-bold mt-0.5" style="background:${sc}">${i+1}</span>
        <span>${s}</span></li>`).join('')}
    </ol>
    <a href="${r.sourceUrl}" target="_blank" class="mt-4 block text-xs text-blue-500 hover:underline">↗ Originál na ${r.sourceLabel}</a>`;
  document.getElementById('recipe-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('recipe-modal').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

/* ═══════════════════════════════════════════════
   EXPORT
═══════════════════════════════════════════════ */
function generatePDF() {
  const rows = [];
  let curSection = '';
  document.querySelectorAll('#shopping-body tr').forEach(row => {
    if (row.style.display === 'none') return;
    const hd = row.querySelector('td[colspan]');
    if (hd) { rows.push([{text:hd.textContent,bold:true,colSpan:4,fillColor:'#f0f0f0',fontSize:9},'','','']); return; }
    const chk = row.querySelector('input');
    const tds = row.querySelectorAll('td:not(:first-child):not(:last-child)');
    const done = chk && chk.checked;
    rows.push([
      {text:done?'✓':'○',alignment:'center',fontSize:9,color:done?'#d32f2f':'#999'},
      {text:tds[0]?.textContent||'',fontSize:9,decoration:done?'lineThrough':null},
      {text:tds[1]?.textContent||'',fontSize:9,alignment:'center'},
      {text:tds[2]?.textContent||'',fontSize:9,alignment:'right'}
    ]);
  });
  pdfMake.createPdf({
    content:[
      {text:'🥗 Nákupní seznam – Jídelníček 21.–27. 4. 2026',style:'h'},
      {text:'Kaufland akce: Losos -54% | Vepřová -60% | Eidam -57% | Jogurt -62%',style:'sub'},
      {table:{widths:[18,'*',80,80],body:[[{text:'',bold:true},{text:'Položka',bold:true,fontSize:9},{text:'Množství',bold:true,fontSize:9,alignment:'center'},{text:'Cena',bold:true,fontSize:9,alignment:'right'}],...rows]},layout:'lightHorizontalLines'},
      {text:`\nCELKEM: ${document.getElementById('total-price').textContent} Kč`,style:'tot'}
    ],
    styles:{h:{fontSize:13,bold:true,margin:[0,0,0,4]},sub:{fontSize:9,color:'#ff6f00',margin:[0,0,0,8]},tot:{fontSize:12,bold:true,alignment:'right',color:'#2e7d32'}},
    pageSize:'A4',pageMargins:[28,28,28,28]
  }).download('nakupni-seznam.pdf');
  showToast('📄 PDF stahování zahájeno');
}

function sendEmailPlan() {
  const items = [];
  document.querySelectorAll('#shopping-body tr').forEach(row => {
    if (row.style.display === 'none') return;
    if (row.querySelector('td[colspan]')) return;
    if (row.querySelector('input')?.checked) return;
    const tds = row.querySelectorAll('td:not(:first-child)');
    if (tds.length >= 2) items.push(`• ${tds[0].textContent.trim()} – ${tds[1].textContent.trim()}`);
  });
  emailjs.send('service_2h3ehkd','template_seall0o',{
    to_email:'pragodavid@gmail.com',to_name:'David',
    subject:'Jídelníček + nákupní seznam 21.–27. 4. 2026',
    message:`JÍDELNÍČEK 21.–27. 4. 2026\n\nNÁKUPNÍ SEZNAM:\n${items.join('\n')}\n\nCELKEM: ${document.getElementById('total-price').textContent} Kč`
  }).then(()=>showToast('📧 E-mail odeslán!')).catch(()=>showToast('⚠️ Chyba odesílání'));
}

function copyShoppingText() {
  const lines = ['NÁKUPNÍ SEZNAM – 21.–27. 4. 2026',''];
  document.querySelectorAll('#shopping-body tr').forEach(row => {
    if (row.style.display === 'none') return;
    const hd = row.querySelector('td[colspan]');
    if (hd) { lines.push('\n'+hd.textContent); return; }
    if (row.querySelector('input')?.checked) return;
    const tds = row.querySelectorAll('td:not(:first-child)');
    if (tds.length>=2) lines.push(`□ ${tds[0].textContent.trim()} – ${tds[1].textContent.trim()}`);
  });
  lines.push(`\nCelkem: ${document.getElementById('total-price').textContent} Kč`);
  navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('📋 Zkopírováno!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 3200);
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  renderWeather();
  renderDeals();
  renderDays();
  renderShopping();
  // Apply default shopping day (pátek) → reorder cards
  setShoppingDay('pa');
  updateShoppingInfo();
  // Initial filter pass
  applyFilters();
});
</script>
