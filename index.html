<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🥗 Chytrý Jídelníček</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    :root {
      --c-header: #2e7d32;
      --c-breakfast: #f9a825;
      --c-lunch: #388e3c;
      --c-dinner: #1565c0;
      --c-action: #ff6f00;
      --c-restart: #00695c;
      --c-kucharkadc: #6a1d8a;
      --c-bg: #e8f5e9;
      --c-checked: #d32f2f;
    }
    body { background: var(--c-bg); font-family: 'Segoe UI', system-ui, sans-serif; }
    .sticky-bar { position: sticky; top: 0; z-index: 50; background: var(--c-header); }
    .btn-day { padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; color: white; background: rgba(255,255,255,0.15); cursor: pointer; border: none; transition: background .2s; }
    .btn-day.active, .btn-day:hover { background: rgba(255,255,255,0.35); }
    .src-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; color: white; margin-bottom: 4px; }
    .src-badge.restart { background: var(--c-restart); }
    .src-badge.kucharkadc { background: var(--c-kucharkadc); }
    .recipe-card { border-left: 4px solid #ccc; background: white; border-radius: 8px; padding: 12px; cursor: pointer; transition: box-shadow .2s, transform .1s; }
    .recipe-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); transform: translateY(-2px); }
    .recipe-card[data-source="restart"] { border-left-color: var(--c-restart); }
    .recipe-card[data-source="kucharkadc"] { border-left-color: var(--c-kucharkadc); }
    .meal-header { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 6px 10px; border-radius: 6px 6px 0 0; color: white; }
    .meal-snidane { background: var(--c-breakfast); }
    .meal-obed { background: var(--c-lunch); }
    .meal-vecere { background: var(--c-dinner); }
    .row-akce td:first-child::after { content: '🏷️'; margin-left: 4px; }
    .row-akce { background: #fff8e1 !important; }
    tr.checked-row td { color: var(--c-checked); text-decoration: line-through; opacity: .5; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; z-index: 1000; overflow-y: auto; }
    .modal-overlay.active { display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
    .modal-box { background: white; border-radius: 12px; max-width: 560px; width: 100%; padding: 24px; position: relative; margin: auto; }
    .tag-vydatne { background: #1565c0; color: white; }
    .tag-smisene { background: #388e3c; color: white; }
    .tag-lehke { background: #f9a825; color: white; }
    .weather-badge { font-size: 12px; background: rgba(255,255,255,.2); border-radius: 20px; padding: 3px 10px; }
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: #2e7d32; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; }
    @media (max-width: 640px) {
      .meal-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header style="background: var(--c-header);" class="text-white px-4 py-3 shadow-lg">
  <div class="max-w-5xl mx-auto flex justify-between items-center flex-wrap gap-2">
    <div>
      <h1 class="text-xl font-bold">🥗 Chytrý Jídelníček</h1>
      <p class="text-xs opacity-75">Generováno 21. 4. 2026 · Kaufland akce + počasí Praha</p>
    </div>
    <div id="weather-summary" class="flex gap-2 flex-wrap text-xs"></div>
  </div>
</header>

<!-- ===== STICKY FILTER BAR ===== -->
<div class="sticky-bar shadow-md">
  <div class="max-w-5xl mx-auto px-4 py-2 flex flex-wrap justify-between items-center gap-2">
    <div class="flex gap-1 flex-wrap" id="day-filters">
      <button class="btn-day active" onclick="filterDay('all', this)">Vše</button>
      <button class="btn-day" onclick="filterDay('ut', this)">Út 21.4</button>
      <button class="btn-day" onclick="filterDay('st', this)">St 22.4</button>
      <button class="btn-day" onclick="filterDay('ct', this)">Čt 23.4</button>
      <button class="btn-day" onclick="filterDay('pa', this)">Pá 24.4</button>
      <button class="btn-day" onclick="filterDay('so', this)">So 25.4</button>
      <button class="btn-day" onclick="filterDay('ne', this)">Ne 26.4</button>
      <button class="btn-day" onclick="filterDay('po', this)">Po 27.4</button>
    </div>
    <div class="flex gap-4 text-white text-sm">
      <label class="flex items-center gap-1 cursor-pointer">
        <input type="checkbox" id="chk-restart" checked onchange="toggleSource('restart', this.checked)" class="accent-teal-600">
        <span class="font-semibold" style="color:#a5d6a7">● Restart hubnutí</span>
      </label>
      <label class="flex items-center gap-1 cursor-pointer">
        <input type="checkbox" id="chk-kucharka" checked onchange="toggleSource('kucharkadc', this.checked)" class="accent-purple-500">
        <span class="font-semibold" style="color:#ce93d8">● Kuchařka pro dceru</span>
      </label>
    </div>
  </div>
</div>

<!-- ===== KAUFLAND BANNER ===== -->
<div class="max-w-5xl mx-auto px-4 mt-4">
  <div class="bg-orange-50 border border-orange-200 rounded-xl p-3 flex gap-3 flex-wrap items-center">
    <span class="font-bold text-orange-700 text-sm">🏷️ KAUFLAND AKCE tento týden:</span>
    <div id="deals-strip" class="flex gap-2 flex-wrap text-xs"></div>
  </div>
</div>

<!-- ===== DAYS CONTAINER ===== -->
<main class="max-w-5xl mx-auto px-4 pb-6" id="days-container"></main>

<!-- ===== SHOPPING LIST ===== -->
<section class="max-w-5xl mx-auto px-4 pb-4" id="shopping-section">
  <div class="bg-white rounded-xl shadow p-4">
    <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
      <h2 class="text-xl font-bold">🛒 Nákupní seznam</h2>
      <div class="text-sm text-gray-500">
        <label class="mr-3"><input type="checkbox" id="show-only-akce" onchange="toggleAkceFilter(this.checked)"> Pouze AKCE položky</label>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm border-collapse" id="shopping-table">
        <thead>
          <tr class="bg-gray-50 text-gray-600">
            <th class="p-2 w-8"></th>
            <th class="p-2 text-left">Položka</th>
            <th class="p-2 text-center">Množství</th>
            <th class="p-2 text-right">Cena</th>
            <th class="p-2 text-left text-xs text-gray-400 hidden sm:table-cell">Poznámka</th>
          </tr>
        </thead>
        <tbody id="shopping-body"></tbody>
      </table>
    </div>
    <div class="mt-4 flex justify-between items-center flex-wrap gap-3 border-t pt-3">
      <div class="text-sm text-gray-500">Odškrtnuté položky se nezapočítávají</div>
      <div class="text-xl font-bold">Celkem: <span id="total-price" class="text-green-700">0,00</span> Kč</div>
    </div>
  </div>
</section>

<!-- ===== EXPORT BAR ===== -->
<div class="max-w-5xl mx-auto px-4 pb-8">
  <div class="bg-white rounded-xl shadow p-4 flex gap-3 flex-wrap">
    <button onclick="generatePDF()" class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 font-semibold text-sm transition">
      <i class="fas fa-file-pdf"></i> Stáhnout PDF
    </button>
    <button onclick="sendEmailPlan()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold text-sm transition">
      <i class="fas fa-envelope"></i> Odeslat e-mailem
    </button>
    <button onclick="copyShoppingText()" class="flex items-center gap-2 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-semibold text-sm transition">
      <i class="fas fa-copy"></i> Kopírovat seznam
    </button>
  </div>
</div>

<!-- ===== UNIVERSAL MODAL ===== -->
<div class="modal-overlay" id="recipe-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button onclick="closeModal()" class="absolute top-3 right-4 text-2xl text-gray-400 hover:text-gray-700 font-bold leading-none">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ===== DATA + SCRIPTS ===== -->

  emailjs.init("2O9xlPmD5Yc5OXnAI");

    "rst_ob2":{"id":"rst_ob2","source":"restart","sourceLabel":"Restart hubnutí","sourceUrl":"https://restarthubnuti.cz/kapustove-bochanky-s-krutim-masem-a-kari-omackou/","meal":"obed","mealLabel":"Oběd","name":"Kapustové bochánky s krůtím masem","time":"35 min","calories":"~420 kcal","tag":"vydatne","ingredients":[{"name":"Mleté krůtí maso","qty":"600 g"},{"name":"Kapusta","qty":"0,5 hlávky"},{"name":"Vejce","qty":"2 ks"},{"name":"Mouka","qty":"4 lžíce"},{"name":"Kari","qty":"2 lžičky"},{"name":"🏷️ Slunečnicový olej Slunka","qty":"na smažení"},{"name":"🏷️ Olma Florian jogurt","qty":"150 g"},{"name":"Sůl, pepř","qty":"dle chuti"}],"steps":["Kapustu jemně nasekejte a blanšírujte 3 min ve vroucí vodě.","Smíchejte maso, kapustu, vejce, mouku, sůl a pepř.","Tvarujte bochánky a smažte na oleji 4 min z každé strany.","Kari omáčku připravte z jogurtu, kari, soli a česneku.","Podávejte bochánky přelité omáčkou."]},
    "rst_ob3":{"id":"rst_ob3","source":"restart","sourceLabel":"Restart hubnutí","sourceUrl":"https://restarthubnuti.cz/pecena-ryze-se-zeleninou-a-halloumi/","meal":"obed","mealLabel":"Oběd","name":"Pečená rýže se zeleninou a halloumi","time":"45 min","calories":"~450 kcal","tag":"vydatne","ingredients":[{"name":"Rýže kulatozrnná","qty":"400 g"},{"name":"🏷️ Vinica mražená zelenina","qty":"450 g"},{"name":"Halloumi","qty":"200 g"},{"name":"Kuřecí vývar","qty":"700 ml"},{"name":"Kurkuma, sůl, pepř","qty":"dle chuti"},{"name":"🏷️ Slunečnicový olej Slunka","qty":"2 lžíce"}],"steps":["Troubu předehřejte na 200 °C.","Rýži rozmíchejte s vývárem, kurkumou a olejem v pekáčku.","Přidejte rozmraženou zeleninu a promíchejte.","Halloumi nakrájejte a rozložte navrch.","Pečte 35–40 min, dokud rýže nevsákne veškerou tekutinu."]},

      <div class="recipe-card" data-source="${r.source}" onclick="openModal('${r.id}')">
        <span class="src-badge ${r.source}">${r.sourceLabel}</span>
        <h4 class="font-semibold text-sm text-gray-800 leading-tight">${r.name}</h4>
        <div class="mt-1 flex gap-2 flex-wrap text-xs text-gray-500">
          <span>⏱ ${r.time}</span>
          <span>🔥 ${r.calories}</span>
          <span class="px-1.5 py-0.5 rounded text-white text-xs ${tagCls}">${tagLabels[r.tag]||''}</span>
        </div>
        <div class="mt-2 text-xs text-blue-600 hover:underline">→ Zobrazit recept</div>
      </div>`;
  }

  /* ===== MODAL ===== */
  function openModal(id) {
    const r = recipesData[id];
    if (!r) return;
    const srcColor = r.source === 'restart' ? 'var(--c-restart)' : 'var(--c-kucharkadc)';
    document.getElementById('modal-body').innerHTML = `
      <div class="flex items-start justify-between mb-3">
        <div>
          <span class="src-badge ${r.source}">${r.sourceLabel}</span>
          <h2 class="text-xl font-bold mt-1">${r.name}</h2>
          <div class="text-sm text-gray-500 mt-1">⏱ ${r.time} &nbsp;|&nbsp; 🔥 ${r.calories} &nbsp;|&nbsp; 👥 4 osoby</div>
        </div>
      </div>
      <h3 class="font-bold border-b pb-1 mb-2" style="color:${srcColor}">Ingredience</h3>
      <ul class="space-y-1 mb-4">
        ${r.ingredients.map(i => `
          <li class="flex justify-between text-sm border-b border-gray-50 py-1">
            <span>${i.name}</span>
            <span class="text-gray-500 font-medium">${i.qty}</span>
          </li>`).join('')}
      </ul>
      <h3 class="font-bold border-b pb-1 mb-2" style="color:${srcColor}">Postup</h3>
      <ol class="space-y-2">
        ${r.steps.map((s,i) => `
          <li class="flex gap-2 text-sm">
            <span class="flex-shrink-0 w-5 h-5 rounded-full text-white text-xs flex items-center justify-center font-bold mt-0.5" style="background:${srcColor}">${i+1}</span>
            <span>${s}</span>
          </li>`).join('')}
      </ol>
      <a href="${r.sourceUrl}" target="_blank" class="mt-4 block text-xs text-blue-500 hover:underline">↗ Originál receptu na ${r.sourceLabel}</a>`;
    document.getElementById('recipe-modal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('recipe-modal').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* ===== SOURCE FILTER ===== */
  function toggleSource(src, show) {
    if (show) activeSources.add(src); else activeSources.delete(src);
    document.querySelectorAll('[data-source]').forEach(el => {
      const s = el.dataset.source;
      if (s === 'restart' || s === 'kucharkadc') {
        el.style.display = activeSources.has(s) ? '' : 'none';
      }
    });
    recalcTotal();
  }

  /* ===== DAY FILTER ===== */
  function filterDay(day, btn) {
    activeDay = day;
    document.querySelectorAll('.btn-day').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.day-card').forEach(card => {
      card.style.display = (day === 'all' || card.dataset.day === day) ? '' : 'none';
    });
  }

  /* ===== SHOPPING LIST ===== */
  function renderShopping() {
    const tbody = document.getElementById('shopping-body');
    let lastSection = null;
    tbody.innerHTML = '';

    shoppingData.forEach(item => {
      const section = item.isAkce ? 'akce' : (item.source || 'sdilene');
      if (section !== lastSection) {
        lastSection = section;
        const labels = {akce:'🏷️ KAUFLAND AKCE',sdilene:'📦 Základní suroviny',restart:'🥬 Restart hubnutí',kucharkadc:'👩‍🍳 Kuchařka pro dceru'};
        const lbl = labels[section] || section;
        const srcAttr = (section === 'restart' || section === 'kucharkadc') ? `data-source="${section}"` : '';
        tbody.insertAdjacentHTML('beforeend',
          `<tr ${srcAttr} class="bg-gray-100 font-bold text-xs text-gray-600">
            <td colspan="5" class="px-2 py-2">${lbl}</td>
          </tr>`);
      }

      const srcAttr = item.source ? `data-source="${item.source}"` : '';
      const akceClass = item.isAkce ? 'row-akce' : '';
      tbody.insertAdjacentHTML('beforeend',
        `<tr ${srcAttr} class="${akceClass} border-b hover:bg-gray-50" data-price="${item.price}" id="shop-${item.id}">
          <td class="p-2"><input type="checkbox" onchange="toggleShopItem(this.closest('tr'))" class="w-4 h-4 cursor-pointer"></td>
          <td class="p-2 font-medium text-sm">${item.name}</td>
          <td class="p-2 text-center text-sm text-gray-600">${item.qty}</td>
          <td class="p-2 text-right text-sm font-semibold">${item.price.toFixed(2)} Kč</td>
          <td class="p-2 text-xs text-gray-400 hidden sm:table-cell">${item.note || ''}</td>
        </tr>`);
    });

    recalcTotal();
  }

  function toggleShopItem(row) {
    const checked = row.querySelector('input').checked;
    row.classList.toggle('checked-row', checked);
    recalcTotal();
  }

  function toggleAkceFilter(onlyAkce) {
    showOnlyAkce = onlyAkce;
    document.querySelectorAll('#shopping-body tr').forEach(row => {
      if (row.querySelector('td[colspan]')) return;
      if (onlyAkce && !row.classList.contains('row-akce')) {
        row.dataset.hiddenByAkce = '1';
        row.style.display = 'none';
      } else {
        delete row.dataset.hiddenByAkce;
        const src = row.dataset.source;
        row.style.display = (!src || activeSources.has(src)) ? '' : 'none';
      }
    });
    recalcTotal();
  }

  function recalcTotal() {
    let total = 0;
    document.querySelectorAll('#shopping-body tr').forEach(row => {
      if (row.querySelector('td[colspan]')) return;
      if (row.dataset.hiddenByAkce) return;
      const src = row.dataset.source;
      if (src && !activeSources.has(src)) return;
      if (row.style.display === 'none') return;
      const chk = row.querySelector('input[type="checkbox"]');
      if (chk && !chk.checked) {
        total += parseFloat(row.dataset.price || 0);
      }
    });
    document.getElementById('total-price').textContent = total.toFixed(2);
  }

  /* ===== PDF EXPORT ===== */
  function generatePDF() {
    const rows = [];
    let currentSection = '';
    document.querySelectorAll('#shopping-body tr').forEach(row => {
      if (row.style.display === 'none' || row.dataset.hiddenByAkce) return;
      const src = row.dataset.source;
      if (src && !activeSources.has(src)) return;
      const headerCell = row.querySelector('td[colspan]');
      if (headerCell) {
        currentSection = headerCell.textContent;
        rows.push([{text: currentSection, bold: true, colSpan: 4, fillColor: '#f0f0f0', fontSize: 9},'','','']);
        return;
      }
      const chk = row.querySelector('input');
      const cells = row.querySelectorAll('td:not(:first-child):not(:last-child)');
      const checked = chk && chk.checked;
      rows.push([
        {text: checked ? '✓' : '○', alignment: 'center', fontSize: 9, color: checked ? '#d32f2f' : '#666'},
        {text: cells[0]?.textContent || '', fontSize: 9, decoration: checked ? 'lineThrough' : null},
        {text: cells[1]?.textContent || '', fontSize: 9, alignment: 'center'},
        {text: cells[2]?.textContent || '', fontSize: 9, alignment: 'right'}
      ]);
    });

    const totalEl = document.getElementById('total-price');
    const docDef = {
      content: [
        {text: '🥗 Nákupní seznam – Jídelníček 21.–27. 4. 2026', style: 'header'},
        {text: 'Kaufland akce: Losos -54 % | Vepřová pečeně -60 % | Eidam -57 % | Jogurt -62 %', style: 'sub'},
        {
          table: {
            widths: [20, '*', 80, 80],
            body: [
              [{text:'',bold:true},{text:'Položka',bold:true,fontSize:9},{text:'Množství',bold:true,fontSize:9,alignment:'center'},{text:'Cena',bold:true,fontSize:9,alignment:'right'}],
              ...rows
            ]
          },
          layout: 'lightHorizontalLines'
        },
        {text: `\nCELKEM: ${totalEl.textContent} Kč`, style: 'total'}
      ],
      styles: {
        header: {fontSize: 14, bold: true, margin: [0,0,0,6]},
        sub: {fontSize: 9, color: '#ff6f00', margin: [0,0,0,10]},
        total: {fontSize: 13, bold: true, alignment: 'right', color: '#2e7d32'}
      },
      pageSize: 'A4',
      pageMargins: [30, 30, 30, 30]
    };
    pdfMake.createPdf(docDef).download('nakupni-seznam-jidelnicek.pdf');
    showToast('📄 PDF stahování zahájeno');
  }

  /* ===== EMAIL EXPORT ===== */
  function sendEmailPlan() {
    const items = [];
    document.querySelectorAll('#shopping-body tr').forEach(row => {
      if (row.style.display === 'none' || row.dataset.hiddenByAkce) return;
      if (row.querySelector('td[colspan]')) return;
      const src = row.dataset.source;
      if (src && !activeSources.has(src)) return;
      const chk = row.querySelector('input');
      if (chk && chk.checked) return;
      const cells = row.querySelectorAll('td:not(:first-child)');
      if (cells.length >= 2) {
        items.push(`• ${cells[0].textContent.trim()} – ${cells[1].textContent.trim()} (${cells[2]?.textContent.trim() || ''})`);
      }
    });

    const total = document.getElementById('total-price').textContent;
    const message = `JÍDELNÍČEK 21.–27. 4. 2026\n\nNÁKUPNÍ SEZNAM:\n${items.join('\n')}\n\nCELKEM: ${total} Kč\n\nKaufland akce: Losos -54% | Vepřová pečeně -60% | Eidam -57% | Jogurt -62%`;

    emailjs.send('service_2h3ehkd', 'template_seall0o', {
      to_email: 'pragodavid@gmail.com',
      to_name: 'David',
      subject: 'Jídelníček + nákupní seznam 21.–27. 4. 2026',
      message: message
    }).then(() => {
      showToast('📧 E-mail úspěšně odeslán na pragodavid@gmail.com');
    }).catch(err => {
      console.error('EmailJS error:', err);
      showToast('⚠️ Chyba při odesílání e-mailu');
    });
  }

  /* ===== COPY TEXT ===== */
  function copyShoppingText() {
    const lines = ['NÁKUPNÍ SEZNAM – Jídelníček 21.–27. 4. 2026', ''];
    document.querySelectorAll('#shopping-body tr').forEach(row => {
      if (row.style.display === 'none' || row.dataset.hiddenByAkce) return;
      const src = row.dataset.source;
      if (src && !activeSources.has(src)) return;
      const headerCell = row.querySelector('td[colspan]');
      if (headerCell) { lines.push('\n' + headerCell.textContent); return; }
      const chk = row.querySelector('input');
      if (chk && chk.checked) return;
      const cells = row.querySelectorAll('td:not(:first-child)');
      if (cells.length >= 2) lines.push(`□ ${cells[0].textContent.trim()} – ${cells[1].textContent.trim()}`);
    });
    lines.push(`\nCelkem: ${document.getElementById('total-price').textContent} Kč`);
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      showToast('📋 Zkopírováno do schránky');
    });
  }

  /* ===== TOAST ===== */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3500);
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
